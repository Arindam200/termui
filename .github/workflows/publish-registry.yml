name: Publish Registry

on:
  push:
    branches: [main]
    paths:
      - 'registry/**'
      - 'packages/components/src/**'
      - 'scripts/publish-registry.mjs'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    name: Build & deploy registry to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync registry from source
        run: node scripts/publish-registry.mjs

      - name: Add CORS headers via _headers file
        run: |
          cat > registry/_headers <<'EOF'
          /*
            Access-Control-Allow-Origin: *
            Cache-Control: public, max-age=300, stale-while-revalidate=60
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: registry

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
