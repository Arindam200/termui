name: Publish Registry

on:
  push:
    branches: [main]
    paths:
      - 'registry/**'

jobs:
  validate:
    name: Validate Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate all schema.json entries have source files
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const schema = JSON.parse(fs.readFileSync('registry/schema.json', 'utf8'));
          const components = schema.components || {};
          let failed = false;
          for (const [name, meta] of Object.entries(components)) {
            const files = meta.files || [];
            for (const file of files) {
              const src = path.join('registry/components', name, file);
              if (!fs.existsSync(src)) {
                console.error('MISSING:', src);
                failed = true;
              }
            }
          }
          if (failed) process.exit(1);
          console.log('All registry source files present');
          "

  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: registry
      - id: deployment
        uses: actions/deploy-pages@v4
